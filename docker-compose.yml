services:
  camoufox-server:
    image: ghcr.io/mapacheverdugo/camoufox-server:latest
    ports:
      - "${EXPOSED_PORT:-1234}:1234"
    environment:
      - DISPLAY=:99
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.socket().connect(('localhost', 1234))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
