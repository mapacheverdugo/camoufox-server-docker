services:
  camoufox-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PLAYWRIGHT_VERSION: "${PLAYWRIGHT_VERSION:-}"
        CAMOUFOX_VERSION: "${CAMOUFOX_VERSION:-}"
    image: camoufox-server:local
    container_name: camoufox-server
    ports:
      - "${EXPOSED_PORT:-1234}:${PORT:-1234}"
    environment:
      # Virtual display (Xvfb). Set ENABLE_XVFB=false to run headless.
      ENABLE_XVFB: "${ENABLE_XVFB:-true}"
      DISPLAY: ":99"
      SCREEN_WIDTH: "${SCREEN_WIDTH:-1280}"
      SCREEN_HEIGHT: "${SCREEN_HEIGHT:-720}"
      SCREEN_DEPTH: "${SCREEN_DEPTH:-16}"
      # Camoufox server
      PORT: "${PORT:-1234}"
      WS_PATH: "${WS_PATH:-/}"
      GEOIP: "${GEOIP:-true}"
      HUMANIZE: "${HUMANIZE:-true}"
      # Optional upstream proxy
      PROXY_SERVER: "${PROXY_SERVER:-}"
      PROXY_USERNAME: "${PROXY_USERNAME:-}"
      PROXY_PASSWORD: "${PROXY_PASSWORD:-}"
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-2G}
        reservations:
          memory: ${MEM_RESERVATION:-1G}
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import os, socket; socket.socket().connect(('localhost', int(os.environ.get('PORT','1234'))))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
